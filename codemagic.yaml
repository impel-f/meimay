workflows:
  android-capacitor-debug:
    name: Android Capacitor debug build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: v22.11.0
      java: 21
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor Android project
        script: npx cap sync android
      - name: Remove marketing-only native assets
        script: npm run prune:native-marketing-assets -- android
      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  android-release-aab:
    name: Android release AAB
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - android-signing
      vars:
        ANDROID_VERSION_CODE: "48"
        ANDROID_VERSION_NAME: "1.2.6"
      node: v22.11.0
      java: 21
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor Android project
        script: npx cap sync android
      - name: Remove marketing-only native assets
        script: npm run prune:native-marketing-assets -- android
      - name: Prepare Android keystore
        script: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$CM_BUILD_DIR/android/release.keystore"
            export ANDROID_KEYSTORE_PATH="$CM_BUILD_DIR/android/release.keystore"
          fi
      - name: Build Android release bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

  ios-capacitor-smoke:
    name: iOS Capacitor smoke build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: v22.11.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Remove marketing-only native assets
        script: npm run prune:native-marketing-assets -- ios
      - name: Build iOS app without signing
        script: |
          xcodebuild \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

  ios-testflight:
    name: iOS TestFlight upload
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: "com.impelf.meimay"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6760251452"
        IOS_MARKETING_VERSION: "1.3.0"
        IOS_BUILD_NUMBER: "27"
      node: v22.11.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Remove marketing-only native assets
        script: npm run prune:native-marketing-assets -- ios
      - name: Set iOS version and build number
        script: |
          MARKETING_VERSION="${IOS_MARKETING_VERSION:-1.3.0}"
          BUILD_VERSION="${IOS_BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-$BUILD_NUMBER}}"
          BUILD_VERSION="${BUILD_VERSION:-27}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" "$CM_BUILD_DIR/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_VERSION" "$CM_BUILD_DIR/ios/App/App/Info.plist"
      - name: Initialize code signing keychain
        script: keychain initialize
      - name: Fetch or create iOS App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add signing certificates to keychain
        script: keychain add-certificates
      - name: Set up provisioning profiles settings on Xcode project
        script: xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Build ipa for App Store Connect
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
