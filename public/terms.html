<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="メイメーの利用規約">
    <title>利用規約 | メイメー</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            color: #5d5444;
            background: #fdfaf5;
            font-family: "Zen Maru Gothic", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #fdfaf5;
        }

        .page {
            width: min(860px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 56px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 1px solid #eadfce;
            padding-bottom: 18px;
        }

        .brand {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            font-weight: 700;
        }

        a {
            color: #9a7432;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        h1 {
            margin: 0 0 10px;
            color: #3f3529;
            font-size: clamp(28px, 6vw, 42px);
            line-height: 1.2;
            letter-spacing: 0;
        }

        .updated {
            margin: 0 0 28px;
            color: #8b7e66;
            font-size: 13px;
            font-weight: 700;
        }

        .doc {
            border: 1px solid #eadfce;
            border-radius: 18px;
            background: #fffaf0;
            padding: clamp(20px, 5vw, 36px);
            box-shadow: 0 12px 30px rgba(93, 84, 68, 0.08);
            font-size: 15px;
            line-height: 1.9;
        }

        .doc h3 {
            margin: 28px 0 8px;
            color: #4a4035;
            font-size: 18px;
        }

        .doc p {
            margin: 0 0 16px;
        }

        @media (max-width: 560px) {
            header {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header>
            <div class="brand">メイメー</div>
            <nav aria-label="関連ページ">
                <a href="/privacy.html">プライバシーポリシー</a>
                <a href="/support.html">お問い合わせ</a>
                <a href="/">アプリへ戻る</a>
            </nav>
        </header>
        <h1>利用規約</h1>
        <p class="updated" id="updated">最終更新日を読み込み中</p>
        <section class="doc" id="doc-content">読み込み中です。</section>
    </main>

    <script src="/js/data/legal-docs.js?v=25.12"></script>
    <script>
        const docs = window.MeimayLegalDocs || {};
        document.getElementById('doc-content').innerHTML = docs.termsOfService || '利用規約を読み込めませんでした。';
        document.getElementById('updated').textContent = `最終更新日：${docs.lastUpdated || '2026年4月30日'}`;
    </script>
</body>

</html>
